<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Korean Vocab Quiz</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      padding-top: 80px;
      padding-bottom: 30px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      -webkit-tap-highlight-color: transparent;
    }
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      gap: 8px;
      flex-wrap: wrap;
      backdrop-filter: blur(2px);
      background: rgba(255,255,255,0.96);
    }
    #score {
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn-submit, .btn-shuffle {
      border: none;
      padding: 8px 18px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.12s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      touch-action: manipulation;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-submit {
      background: #1e293b;
      color: white;
    }
    .btn-submit:active {
      background: #0f172a;
      transform: scale(0.96);
    }
    .btn-shuffle {
      background: #7c3aed;
      color: white;
    }
    .btn-shuffle:active {
      background: #5b21b6;
      transform: scale(0.96);
    }
    .container {
      max-width: 100%;
      width: 100%;
      background: white;
      padding: 16px 14px 24px;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.02);
      margin: 0 0;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #0b1e33;
      margin: 0 0 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .subnote {
      color: #475569;
      background: #f1f5f9;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 13px;
      display: inline-block;
      margin-bottom: 16px;
    }
    .question {
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #eef2f6;
    }
    .question:last-of-type {
      border-bottom: none;
    }
    .q-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .q-label {
      font-size: 17px;
      font-weight: 600;
      color: #0f172a;
      min-width: 32px;
    }
    .word-korean {
      font-size: 20px;
      font-weight: 500;
      color: #0b1e33;
      background: #f8fafc;
      padding: 2px 10px 2px 8px;
      border-radius: 30px;
      letter-spacing: 0.2px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .audio-btn {
      background: #eef2ff;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 40px;
      transition: 0.08s;
      color: #2563eb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .audio-btn:active {
      background: #dbe7fe;
      transform: scale(0.92);
    }
    .input-wrap {
      flex: 1 1 160px;
      min-width: 120px;
      margin-top: 4px;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 18px;
      background: white;
      transition: 0.12s;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }
    .input-wrap input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .input-wrap input:active {
      border-color: #3b82f6;
    }
    .correct {
      border-color: #16a34a !important;
      background: #f0fdf4 !important;
    }
    .wrong {
      border-color: #dc2626 !important;
      background: #fef2f2 !important;
    }
    .answer {
      font-size: 15px;
      margin-top: 6px;
      padding-left: 6px;
      color: #334155;
      min-height: 26px;
      line-height: 1.4;
    }
    .answer b {
      color: #0f172a;
      background: #f1f5f9;
      padding: 2px 12px;
      border-radius: 20px;
      font-weight: 600;
    }
    .footnote {
      margin-top: 18px;
      color: #94a3b8;
      font-size: 13px;
      text-align: center;
    }
    @media (max-width: 480px) {
      body { padding-top: 76px; }
      .top-bar { padding: 8px 12px; }
      #score { font-size: 16px; }
      .btn-submit, .btn-shuffle { font-size: 14px; padding: 6px 14px; min-height: 40px; }
      .container { padding: 12px 10px 20px; }
      .q-label { font-size: 15px; min-width: 26px; }
      .word-korean { font-size: 18px; padding: 2px 8px; }
      .audio-btn { width: 36px; height: 36px; font-size: 20px; }
      .input-wrap input { padding: 10px 12px; font-size: 15px; }
    }
    @media (max-width: 380px) {
      .word-korean { font-size: 16px; }
      .audio-btn { width: 32px; height: 32px; font-size: 18px; }
      .input-wrap input { font-size: 14px; padding: 8px 10px; }
    }
    /* prevent zoom on input focus (iOS) */
    input {
      font-size: 16px !important;
    }
    /* better touch */
    button, .audio-btn, .btn-submit, .btn-shuffle {
      touch-action: manipulation;
    }
  </style>
</head>
<body>
<div class="top-bar">
  <div id="score">⭐ 0 / 50</div>
  <div class="btn-group">
    <button class="btn-shuffle" onclick="shuffleQuestions()">🔀 Shuffle</button>
    <button class="btn-submit" onclick="checkAnswers()">✅ Submit</button>
  </div>
</div>

<div class="container">
  <h1>🗣️ Korean Vocab Quiz</h1>
  <div class="subnote">🔊 tap speaker · 🔀 shuffle questions</div>
  <div id="quiz"></div>
</div>

<script>
  // ----- WORD LIST (50 items) with multiple acceptable answers -----
  const baseWords = [
    { k: "부모님", en: ["parent", "parents"] },
    { k: "삼촌", en: ["uncle"] },
    { k: "이모", en: ["auntie", "aunt"] },
    { k: "딸", en: ["daughter"] },
    { k: "아들", en: ["son"] },
    { k: "조카", en: ["niece", "nephew", "niece nephew"] },
    { k: "이웃", en: ["neighbor"] },
    { k: "강아지", en: ["dog", "puppy"] },
    { k: "고양이", en: ["cat"] },
    { k: "간호사", en: ["nurse"] },
    { k: "군인", en: ["soldier"] },
    { k: "선생님", en: ["teacher"] },
    { k: "학생", en: ["student"] },
    { k: "경찰", en: ["police", "policeman", "police officer"] },
    { k: "고모", en: ["auntie", "aunt"] },
    { k: "치우다", en: ["to tidy"] },
    { k: "요리하다", en: ["to cook"] },
    { k: "먹다", en: ["to eat"] },
    { k: "닦다", en: ["to wipe"] },
    { k: "청소하다", en: ["to clean"] },
    { k: "쓸다", en: ["to sweep"] },
    { k: "보다", en: ["to watch", "to see"] },
    { k: "켜다", en: ["to switch on", "to turn on"] },
    { k: "끄다", en: ["to switch off", "to turn off"] },
    { k: "쓰다", en: ["to write"] },
    { k: "운전하다", en: ["to drive"] },
    { k: "만들다", en: ["to make"] },
    { k: "볶다", en: ["to fry"] },
    { k: "자다", en: ["to sleep"] },
    { k: "만나다", en: ["to meet"] },
    { k: "침대", en: ["bed"] },
    { k: "김치", en: ["kimchi"] },
    { k: "책상", en: ["table", "desk"] },
    { k: "텔레비전", en: ["television", "tv"] },
    { k: "청소기", en: ["vacuum cleaner", "vacuum"] },
    { k: "선풍기", en: ["electric fan", "fan"] },
    { k: "난로", en: ["stove"] },
    { k: "주걱", en: ["spatula"] },
    { k: "오토바이", en: ["motorcycle", "motorbike"] },
    { k: "계란", en: ["egg"] },
    { k: "식당", en: ["restaurant"] },
    { k: "공원", en: ["park"] },
    { k: "집", en: ["house", "home"] },
    { k: "방", en: ["room"] },
    { k: "영화관", en: ["cinema", "movie theater"] },
    { k: "아침", en: ["morning"] },
    { k: "하루", en: ["whole day", "day"] },
    { k: "밤", en: ["night"] },
    { k: "새벽", en: ["dawn"] },
    { k: "주말", en: ["weekend"] }
  ];

  // transform baseWords into flat array for rendering [korean, englishString]
  let words = baseWords.map(item => [item.k, item.en.join(' | ')]);

  // ----- render quiz from current 'words' array -----
  function renderQuiz() {
    const quizContainer = document.getElementById("quiz");
    let html = '';

    words.forEach((w, i) => {
      const korean = w[0];
      const english = w[1];
      const qId = `q${i}`;
      const aId = `a${i}`;

      html += `
        <div class="question" data-index="${i}">
          <div class="q-row">
            <span class="q-label">${i+1}.</span>
            <span class="word-korean">
              ${korean}
              <button class="audio-btn" data-word="${korean}" aria-label="Listen to ${korean}" title="Listen (ko-KR)">
                🔊
              </button>
            </span>
            <div class="input-wrap">
              <input id="${qId}" autocomplete="off" placeholder="English" inputmode="text" enterkeyhint="done">
            </div>
          </div>
          <div id="${aId}" class="answer"></div>
        </div>
      `;
    });

    quizContainer.innerHTML = html;

    // ----- attach audio events (mobile friendly) -----
    document.querySelectorAll('.audio-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const word = this.getAttribute('data-word');
        if (!word) return;

        if (window.speechSynthesis) {
          window.speechSynthesis.cancel();
        }

        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'ko-KR';
        utterance.rate = 0.9;
        utterance.pitch = 1;
        utterance.volume = 1;

        // try to get Korean voice
        const voices = window.speechSynthesis.getVoices();
        const koVoice = voices.find(v => v.lang.startsWith('ko'));
        if (koVoice) utterance.voice = koVoice;

        window.speechSynthesis.speak(utterance);
      });
    });

    // update score display
    document.getElementById('score').innerHTML = `⭐ 0 / ${words.length}`;
  }

  // ----- Shuffle (Rumble) -----
  function shuffleQuestions() {
    for (let i = words.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [words[i], words[j]] = [words[j], words[i]];
    }
    renderQuiz();
    // clear all inputs and hints
    document.querySelectorAll('.input-wrap input').forEach(inp => {
      inp.classList.remove('correct', 'wrong');
      inp.value = '';
    });
    document.querySelectorAll('.answer').forEach(el => el.innerHTML = '');
  }

  // ----- normalize helper -----
  function normalize(t) {
    return t.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").replace(/\s+/g, " ");
  }

  // ----- check answers with multiple possibilities (from baseWords) -----
  function checkAnswers() {
    let score = 0;
    // build a map: index -> array of accepted answers (from baseWords)
    const acceptedMap = {};
    baseWords.forEach((item, idx) => {
      // item.en is array of acceptable answers
      acceptedMap[idx] = item.en.map(a => normalize(a));
    });

    words.forEach((w, i) => {
      const input = document.getElementById(`q${i}`);
      const answerDiv = document.getElementById(`a${i}`);
      if (!input || !answerDiv) return;

      const userAns = normalize(input.value);
      // get accepted answers for this index (based on original order)
      // but we need to map shuffled index to original index: words[i] corresponds to some baseWord
      // find the baseWord by matching korean
      const korean = w[0];
      const baseItem = baseWords.find(item => item.k === korean);
      if (!baseItem) return;

      const accepted = baseItem.en.map(a => normalize(a));

      input.classList.remove('correct', 'wrong');

      if (accepted.includes(userAns) && userAns.length > 0) {
        score++;
        input.classList.add('correct');
        answerDiv.innerHTML = '';
      } else {
        input.classList.add('wrong');
        // show correct answer as a string (join with ' or ')
        const display = baseItem.en.join(' / ');
        answerDiv.innerHTML = `✅ Correct: <b>${display}</b>`;
      }
    });

    document.getElementById('score').innerHTML = `⭐ ${score} / ${words.length}`;
  }

  // preload voices (mobile)
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.getVoices();
    };
    // additional trigger for some mobile browsers
    setTimeout(() => {
      window.speechSynthesis.getVoices();
    }, 500);
  }

  // initial render
  renderQuiz();

  // make sure inputs stay usable on mobile
  document.addEventListener('touchstart', function() {
    // just to improve responsiveness
  }, { passive: true });
</script>
</body>
</html>
